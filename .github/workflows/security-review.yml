name: Security Review

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-review:
    runs-on: ubuntu-latest
    name: security-reviewx QUICK scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run security-reviewx QUICK scan
        id: scan
        run: |
          echo "🔒 security-reviewx QUICK scan (M1-M4)"
          echo "========================================"

          PATTERN_DIR="security-reviewx/patterns"
          CRITICAL=0
          HIGH=0
          MEDIUM=0
          FINDINGS=""

          # M1: SECRET_SCAN — critical vendor patterns
          echo "::group::M1 SECRET_SCAN"
          for pattern in \
            'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{20,}' \
            'AKIA[0-9A-Z]{16}' \
            'ghp_[A-Za-z0-9]{36}' \
            '-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----' \
            'xoxb-[0-9]{10,}' \
            'sk-[A-Za-z0-9]{32,}'; do
            matches=$(grep -rn --include='*.md' --include='*.json' --include='*.js' --include='*.ts' --include='*.py' --include='*.sh' --include='*.yml' --include='*.yaml' --include='*.env' -E "$pattern" . 2>/dev/null | grep -v 'patterns/' | grep -v '.github/' | grep -v 'EXAMPLE' | grep -v 'placeholder' | grep -v 'test-key' || true)
            if [ -n "$matches" ]; then
              count=$(echo "$matches" | wc -l)
              CRITICAL=$((CRITICAL + count))
              FINDINGS="${FINDINGS}\n::error::SECRET found: ${matches%%$'\n'*}"
            fi
          done
          echo "M1: $CRITICAL critical findings"
          echo "::endgroup::"

          # M3: FILE_SCAN — dangerous files
          echo "::group::M3 FILE_SCAN"
          dangerous=$(find . -name '.env' -o -name '*.pem' -o -name '*.key' -o -name '*.p12' -o -name '*.pfx' | grep -v 'tests/' | grep -v 'node_modules/' || true)
          if [ -n "$dangerous" ]; then
            dcount=$(echo "$dangerous" | wc -l)
            CRITICAL=$((CRITICAL + dcount))
            FINDINGS="${FINDINGS}\n::error::Dangerous file: $dangerous"
          fi
          echo "M3: checked"
          echo "::endgroup::"

          # M4: PATH_SCAN — hardcoded paths
          echo "::group::M4 PATH_SCAN"
          paths=$(grep -rn --include='*.md' --include='*.json' --include='*.js' --include='*.sh' -E '[A-Z]:\\Users\\[^\\{[:space:]]+\\' . 2>/dev/null | grep -v 'patterns/' | grep -v 'tests/' | grep -v '{USERNAME}' | grep -v '{USER}' | grep -v 'example' || true)
          if [ -n "$paths" ]; then
            pcount=$(echo "$paths" | wc -l)
            MEDIUM=$((MEDIUM + pcount))
          fi
          echo "M4: $MEDIUM medium findings"
          echo "::endgroup::"

          # Verdict
          TOTAL=$((CRITICAL + HIGH + MEDIUM))
          echo "========================================"
          echo "Findings: $CRITICAL CRITICAL, $HIGH HIGH, $MEDIUM MEDIUM"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "verdict=FAIL" >> $GITHUB_OUTPUT
            echo "::error::security-reviewx: FAIL — $CRITICAL CRITICAL findings. Fix before merging."
            echo -e "$FINDINGS"
            exit 1
          elif [ "$TOTAL" -gt 0 ]; then
            echo "verdict=WARN" >> $GITHUB_OUTPUT
            echo "::warning::security-reviewx: WARN — $TOTAL non-critical findings."
          else
            echo "verdict=PASS" >> $GITHUB_OUTPUT
            echo "✅ security-reviewx: PASS — no findings."
          fi

      - name: Post scan summary
        if: always()
        run: |
          echo "## 🔒 security-reviewx Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Verdict:** ${{ steps.scan.outputs.verdict || 'FAIL' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** QUICK (M1, M3, M4)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
